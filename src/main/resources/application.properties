spring.application.name=mainwetten

spring.profiles.default=local

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mainwetten}
spring.datasource.username=${DB_USER:mainwetten}
spring.datasource.password=${DB_PASSWORD:mainwetten}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}

spring.flyway.enabled=true

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Server-side usage limits for abuse prevention.
app.usage-limits.bet-creations-per-24-hours=${BET_CREATIONS_PER_24_HOURS:10}
app.usage-limits.max-active-created-bets=${MAX_ACTIVE_CREATED_BETS:25}
app.usage-limits.catch-creations-per-24-hours=${CATCH_CREATIONS_PER_24_HOURS:100}