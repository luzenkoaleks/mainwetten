# Local SMTP test server provided by Mailpit.
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=

spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Prevent requests from waiting indefinitely if Mailpit is unavailable.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# Used later when building verification links.
app.base-url=http://localhost:8080
app.mail.from=no-reply@mainwetten.test

# Persistent login
app.security.remember-me-key=local-development-only-remember-me-key
app.security.remember-me-secure-cookie=false

# Placeholder data for local previews of the legal pages.
# Real production data is supplied through environment variables.
app.legal.full-name=Vorname Nachname
app.legal.street=Straße und Hausnummer
app.legal.postal-code=00000
app.legal.city=Ort
app.legal.country=Deutschland
app.legal.email=kontakt@mainwetten.test
app.legal.supervisory-authority-name=Zuständige Landesdatenschutzbehörde
app.legal.supervisory-authority-address=Anschrift vor Veröffentlichung ergänzen