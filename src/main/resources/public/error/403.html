<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">
    <title>Zugriff nicht erlaubt | Mainwetten</title>
    <link rel="stylesheet" href="/css/error.css">
</head>
<body>

<header class="error-header">
    <div class="error-header-inner">
        <a class="error-brand" href="/">Mainwetten</a>
    </div>
</header>

<main class="error-main">
    <section class="error-card">
        <p class="error-code">403</p>

        <h1 class="error-title">
            Zugriff nicht erlaubt
        </h1>

        <p class="error-text">
            Du darfst diese Aktion nicht ausführen oder diese Seite
            nicht aufrufen.
        </p>

        <div class="error-actions">
            <a class="error-button" href="/dashboard">
                Zum Dashboard
            </a>

            <a class="error-button error-button-secondary"
               href="/">
                Zur Startseite
            </a>
        </div>
    </section>
</main>

</body>
</html>
