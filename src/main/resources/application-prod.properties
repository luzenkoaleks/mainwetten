# Production database configuration:
# No fallback credentials are allowed.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Database and persistence.
spring.jpa.show-sql=false
# Keep the persistence context available while Thymeleaf renders views.
# Some current views access lazy-loaded entity relationships.
# Revisit this after repository fetch plans have been refactored.
spring.jpa.open-in-view=true

# Flyway manages all production schema changes.
spring.flyway.enabled=true

# Hosting platforms may provide their own application port.
server.port=${PORT:8080}

# Session cookie hardening.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# Only transport the session identifier in a cookie.
server.servlet.session.tracking-modes=cookie

# Inactivity timeout.
server.servlet.session.timeout=60m

# Custom error pages.
spring.web.error.whitelabel.enabled=false
spring.web.error.include-exception=false
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-stacktrace=never

# Public URL used in verification and password-reset links.
app.base-url=${APP_BASE_URL}

# Production sender address.
app.mail.from=${MAIL_FROM}

# Production SMTP configuration.
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLED:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}

# Prevent requests from waiting indefinitely if the mail server is unavailable.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Persistent login.
app.security.remember-me-key=${REMEMBER_ME_KEY}
app.security.remember-me-secure-cookie=true

# Legally required provider and privacy contact details.
# The values are supplied only through the production environment.
app.legal.full-name=${LEGAL_FULL_NAME}
app.legal.street=${LEGAL_STREET}
app.legal.postal-code=${LEGAL_POSTAL_CODE}
app.legal.city=${LEGAL_CITY}
app.legal.country=${LEGAL_COUNTRY:Deutschland}
app.legal.email=${LEGAL_EMAIL}
app.legal.supervisory-authority-name=${LEGAL_SUPERVISORY_AUTHORITY_NAME}
app.legal.supervisory-authority-address=${LEGAL_SUPERVISORY_AUTHORITY_ADDRESS}