<!doctype html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Passwort vergessen')}"></head>

<body>

<header th:replace="~{fragments/layout :: navbar('login', false)}"></header>

<main class="container app-page auth-page">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">

            <section class="auth-panel">
                <div class="auth-panel-header">
                    <p class="section-kicker mb-2">
                        Kontozugang
                    </p>

                    <h1 class="auth-title mb-2">
                        Passwort vergessen?
                    </h1>

                    <p class="auth-lead mb-0">
                        Gib deine E-Mail-Adresse ein. Falls ein
                        bestätigtes Konto existiert, senden wir dir
                        einen Link zum Zurücksetzen des Passworts.
                    </p>
                </div>

                <div class="alert alert-success auth-alert"
                     th:if="${requestSuccess}"
                     th:text="${requestSuccess}">
                    Die Anfrage wurde verarbeitet.
                </div>

                <form th:action="@{/forgot-password}"
                      th:object="${passwordResetRequestForm}"
                      method="post"
                      class="auth-form">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <div class="alert alert-danger auth-alert"
                         th:if="${#fields.hasGlobalErrors()}">
                        <div th:each="error : ${#fields.globalErrors()}"
                             th:text="${error}">
                            Die Anfrage konnte nicht verarbeitet werden.
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="email" class="form-label">
                            E-Mail-Adresse
                        </label>

                        <input id="email"
                               type="email"
                               class="form-control"
                               th:field="*{email}"
                               autocomplete="email"
                               required>

                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('email')}"
                             th:errors="*{email}">
                        </div>
                    </div>

                    <button type="submit"
                            class="btn btn-primary auth-submit">
                        Reset-Link senden
                    </button>
                </form>

                <div class="auth-switch">
                    <span>Passwort wieder eingefallen?</span>
                    <a th:href="@{/login}">Zum Login</a>
                </div>
            </section>

        </div>
    </div>
</main>


<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
