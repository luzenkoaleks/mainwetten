<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>

<body>

<header th:replace="~{fragments/layout :: navbar('dashboard', true)}"></header>

<main class="container app-page">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <h1 class="h3 mb-4">Account erstellen</h1>

            <form th:action="@{/register}" th:object="${registrationForm}" method="post" class="card card-body app-card">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="username" class="form-label">Benutzername</label>
                    <input id="username" type="text" class="form-control" th:field="*{username}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">E-Mail-Adresse</label>
                    <input id="email" type="email" class="form-control" th:field="*{email}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Passwort</label>
                    <input id="password" type="password" class="form-control" th:field="*{password}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Passwort wiederholen</label>
                    <input id="confirmPassword" type="password" class="form-control" th:field="*{confirmPassword}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-primary">Registrieren</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
