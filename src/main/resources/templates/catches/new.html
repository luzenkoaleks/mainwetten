<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fang eintragen | Mainwetten</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Mainwetten</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/bets/{id}(id=${bet.id})}">Zur Wette</a>

            <form th:action="@{/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-danger" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <h1 class="h3 mb-1">Fang eintragen</h1>
            <p class="text-muted mb-4" th:text="${bet.title}">Wette</p>

            <form th:action="@{/bets/{id}/catches(id=${bet.id})}" th:object="${catchForm}" method="post" class="card card-body shadow-sm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="fishSpeciesId" class="form-label">Fischart</label>
                    <select id="fishSpeciesId" class="form-select" th:field="*{fishSpeciesId}">
                        <option value="">Bitte auswählen</option>
                        <option th:each="fish : ${fishSpecies}"
                                th:value="${fish.id}"
                                th:text="${fish.name}">
                            Fischart
                        </option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fishSpeciesId')}" th:errors="*{fishSpeciesId}"></div>
                </div>

                <div class="mb-3">
                    <label for="lengthCm" class="form-label">Länge in cm</label>
                    <input id="lengthCm" type="number" step="0.1" min="1" class="form-control" th:field="*{lengthCm}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('lengthCm')}" th:errors="*{lengthCm}"></div>
                </div>

                <div class="mb-4">
                    <label for="caughtDate" class="form-label">Fangdatum</label>
                    <input id="caughtDate" type="date" class="form-control" th:field="*{caughtDate}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('caughtDate')}" th:errors="*{caughtDate}"></div>
                </div>

                <button type="submit" class="btn btn-primary">Fang speichern</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
