<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Fang eintragen')}"></head>

<body>

<header th:replace="~{fragments/layout :: navbar('catches', true)}"></header>

<main class="container app-page">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <h1 class="h3 mb-1">Fang eintragen</h1>
            <a class="btn btn-outline-secondary btn-sm mb-4"
               th:href="@{/bets/{id}(id=${bet.id})}">
                Zurück zur Wette
            </a>
            <p class="text-muted mb-4" th:text="${bet.title}">Wette</p>

            <form th:action="@{/bets/{id}/catches(id=${bet.id})}" th:object="${catchForm}" method="post" class="card card-body app-card">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="fishSpeciesId" class="form-label">Fischart</label>
                    <select id="fishSpeciesId" class="form-select" th:field="*{fishSpeciesId}">
                        <option value="">Bitte auswählen</option>

                        <optgroup label="Süßwasser"
                                  th:if="${!#lists.isEmpty(freshwaterFishSpecies)}">
                            <option th:each="fish : ${freshwaterFishSpecies}"
                                    th:value="${fish.id}"
                                    th:text="${fish.name}">
                                Fischart
                            </option>
                        </optgroup>

                        <optgroup label="Salzwasser"
                                  th:if="${!#lists.isEmpty(saltwaterFishSpecies)}">
                            <option th:each="fish : ${saltwaterFishSpecies}"
                                    th:value="${fish.id}"
                                    th:text="${fish.name}">
                                Fischart
                            </option>
                        </optgroup>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fishSpeciesId')}" th:errors="*{fishSpeciesId}"></div>
                </div>

                <div class="mb-3">
                    <label for="lengthCm" class="form-label">Länge in cm</label>
                    <input id="lengthCm" type="number" step="0.1" min="1" class="form-control" th:field="*{lengthCm}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('lengthCm')}" th:errors="*{lengthCm}"></div>
                    <p class="text-muted small mb-4">
                        Das Fangdatum wird automatisch beim Speichern gesetzt.
                    </p>
                </div>


                <button type="submit" class="btn btn-primary">Fang speichern</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
