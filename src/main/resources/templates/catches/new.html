<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Fang eintragen')}"></head>

<body>

<header th:replace="~{fragments/layout :: navbar('catches', true)}"></header>

<main class="container app-page catch-entry-page">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-xl-6">

            <section class="form-page-hero mb-4">
                <p class="section-kicker mb-2">Fang eintragen</p>

                <h1 class="form-page-title mb-2">
                    Fang speichern
                </h1>

                <p class="form-page-lead mb-0">
                    Trage deinen Fang für
                    <strong th:text="${bet.title}">Wette</strong>
                    ein. Das Fangdatum wird automatisch gesetzt.
                </p>

                <a class="btn btn-outline-primary catch-back-link mt-3"
                   th:href="@{/bets/{id}(id=${bet.id})}">
                    Zurück zur Wette
                </a>
            </section>

            <form th:action="@{/bets/{id}/catches(id=${bet.id})}"
                  th:object="${catchForm}"
                  method="post"
                  class="bet-form-card catch-form-card">

                <div class="alert alert-danger"
                     th:if="${#fields.hasGlobalErrors()}">
                    <div th:each="error : ${#fields.globalErrors()}"
                         th:text="${error}">
                        Fang konnte nicht gespeichert werden.
                    </div>
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-section-title">
                    <p class="section-kicker mb-1">Fangdaten</p>
                    <h2 class="h5 mb-0">Was hast du gefangen?</h2>
                </div>

                <div class="mb-3">
                    <label for="fishSpeciesId" class="form-label">Fischart</label>

                    <select id="fishSpeciesId"
                            class="form-select"
                            th:field="*{fishSpeciesId}"
                            required>
                        <option value="">Bitte auswählen</option>

                        <optgroup label="Süßwasser"
                                  th:if="${!#lists.isEmpty(freshwaterFishSpecies)}">
                            <option th:each="fish : ${freshwaterFishSpecies}"
                                    th:value="${fish.id}"
                                    th:text="${fish.name}">
                                Fischart
                            </option>
                        </optgroup>

                        <optgroup label="Salzwasser"
                                  th:if="${!#lists.isEmpty(saltwaterFishSpecies)}">
                            <option th:each="fish : ${saltwaterFishSpecies}"
                                    th:value="${fish.id}"
                                    th:text="${fish.name}">
                                Fischart
                            </option>
                        </optgroup>
                    </select>

                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('fishSpeciesId')}"
                         th:errors="*{fishSpeciesId}">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="lengthCm" class="form-label">Länge in cm</label>

                    <input id="lengthCm"
                           type="number"
                           step="0.1"
                           min="0.1"
                           max="999.9"
                           inputmode="decimal"
                           class="form-control"
                           th:field="*{lengthCm}"
                           required>

                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('lengthCm')}"
                         th:errors="*{lengthCm}">
                    </div>
                </div>

                <section class="catch-entry-hint mb-4">
                    <strong>Hinweis</strong>
                    <span>
                        Der Fang wird dieser Wette zugeordnet. Das aktuelle Datum wird automatisch gespeichert.
                    </span>
                </section>

                <button type="submit" class="btn btn-primary bet-form-submit">
                    Fang speichern
                </button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
