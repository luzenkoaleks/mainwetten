<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Fang eintragen')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar('catchEntry', true)}"></nav>

<main class="container app-page">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="mb-4">
                <h1 class="h3 mb-2">Fang eintragen</h1>
                <p class="text-muted mb-0">
                    Trage einen Fang ein und ordne ihn einer oder mehreren laufenden Wetten zu.
                </p>
            </div>

            <div class="app-card p-4">
                <div class="alert alert-info mb-0" th:if="${#lists.isEmpty(eligibleBets)}">
                    Du hast aktuell keine Wette, in der du Fänge eintragen kannst.
                </div>

                <form th:unless="${#lists.isEmpty(eligibleBets)}"
                      th:action="@{/catches}"
                      th:object="${globalCatchForm}"
                      method="post">

                    <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
                        <div th:each="error : ${#fields.globalErrors()}" th:text="${error}">
                            Fehler
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="fishSpeciesId" class="form-label">Fischart</label>
                        <select id="fishSpeciesId" class="form-select" th:field="*{fishSpeciesId}">
                            <option value="">Bitte auswählen</option>

                            <optgroup label="Süßwasser"
                                      th:if="${!#lists.isEmpty(freshwaterFishSpecies)}">
                                <option th:each="fish : ${freshwaterFishSpecies}"
                                        th:value="${fish.id}"
                                        th:text="${fish.name}">
                                    Fischart
                                </option>
                            </optgroup>

                            <optgroup label="Salzwasser"
                                      th:if="${!#lists.isEmpty(saltwaterFishSpecies)}">
                                <option th:each="fish : ${saltwaterFishSpecies}"
                                        th:value="${fish.id}"
                                        th:text="${fish.name}">
                                    Fischart
                                </option>
                            </optgroup>
                        </select>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('fishSpeciesId')}"
                             th:errors="*{fishSpeciesId}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="lengthCm" class="form-label">Länge in cm</label>
                        <input id="lengthCm"
                               class="form-control"
                               type="number"
                               min="0.1"
                               step="0.1"
                               th:field="*{lengthCm}">
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('lengthCm')}"
                             th:errors="*{lengthCm}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Wetten</label>
                        <p class="form-text mb-3">
                            Wähle alle Wetten aus, in denen dieser Fang zählen soll.
                        </p>

                        <div class="d-grid gap-3">
                            <label class="app-card p-3"
                                   th:each="bet : ${eligibleBets}"
                                   th:for="${'bet-' + bet.id}">
                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="checkbox"
                                           th:field="*{betIds}"
                                           th:value="${bet.id}"
                                           th:id="${'bet-' + bet.id}">
                                    <span class="form-check-label">
                                        <strong th:text="${bet.title}">Wettname</strong>
                                    </span>
                                </div>

                                <div class="small text-muted mt-2">
                                    <span th:text="${#temporals.format(bet.startDate, 'dd.MM.yyyy')}">01.01.2026</span>
                                    –
                                    <span th:text="${#temporals.format(bet.endDate, 'dd.MM.yyyy')}">07.01.2026</span>
                                </div>

                                <div class="small mt-2">
                                    <strong>Fischarten:</strong>
                                    <span th:text="${bet.fishCategory.displayName}">Alle Fischarten</span>
                                </div>
                            </label>
                        </div>

                        <div class="text-danger small mt-2"
                             th:if="${#fields.hasErrors('betIds')}"
                             th:errors="*{betIds}">
                        </div>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-2">
                        <button class="btn btn-primary" type="submit">
                            Fang speichern
                        </button>
                        <a class="btn btn-outline-secondary" th:href="@{/dashboard}">
                            Abbrechen
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
