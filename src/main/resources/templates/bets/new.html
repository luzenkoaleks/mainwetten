<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Neue Wette | Mainwetten</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Mainwetten</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" href="/dashboard">Dashboard</a>

            <form th:action="@{/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-danger" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h1 class="h3 mb-4">Neue Angelwette erstellen</h1>

            <form th:action="@{/bets}" th:object="${betForm}" method="post" class="card card-body shadow-sm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="title" class="form-label">Titel</label>
                    <input id="title" type="text" class="form-control" th:field="*{title}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Beschreibung</label>
                    <textarea id="description" class="form-control" rows="4" th:field="*{description}"></textarea>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="startDate" class="form-label">Startdatum</label>
                        <input id="startDate" type="date" class="form-control" th:field="*{startDate}">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="endDate" class="form-label">Enddatum</label>
                        <input id="endDate" type="date" class="form-control" th:field="*{endDate}">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="scoringMode" class="form-label">Bewertungsmodus</label>
                    <select id="scoringMode" class="form-select" th:field="*{scoringMode}">
                        <option th:each="mode : ${scoringModes}"
                                th:value="${mode}"
                                th:text="${mode.displayName}">
                            Bewertungsmodus
                        </option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('scoringMode')}" th:errors="*{scoringMode}"></div>
                </div>

                <button type="submit" class="btn btn-primary">Wette erstellen</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
