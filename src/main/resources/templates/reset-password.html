<!doctype html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Neues Passwort festlegen')}"></head>

<body>

<header th:replace="~{fragments/layout :: navbar('login', false)}"></header>

<main class="container app-page auth-page">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">

            <section class="auth-panel">
                <div class="auth-panel-header">
                    <p class="section-kicker mb-2">
                        Passwort zurücksetzen
                    </p>

                    <h1 class="auth-title mb-2">
                        Neues Passwort festlegen
                    </h1>

                    <p class="auth-lead mb-0">
                        Wähle ein neues Passwort für dein
                        Mainwetten-Konto.
                    </p>
                </div>

                <form th:action="@{/reset-password}"
                      th:object="${passwordResetForm}"
                      method="post"
                      class="auth-form">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <input type="hidden"
                           th:field="*{token}">

                    <div class="alert alert-danger auth-alert"
                         th:if="${#fields.hasGlobalErrors()}">
                        <div th:each="error : ${#fields.globalErrors()}"
                             th:text="${error}">
                            Das Passwort konnte nicht geändert werden.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password"
                               class="form-label">
                            Neues Passwort
                        </label>

                        <input id="password"
                               type="password"
                               class="form-control"
                               th:field="*{password}"
                               autocomplete="new-password"
                               required>

                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('password')}"
                             th:errors="*{password}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmPassword"
                               class="form-label">
                            Neues Passwort bestätigen
                        </label>

                        <input id="confirmPassword"
                               type="password"
                               class="form-control"
                               th:field="*{confirmPassword}"
                               autocomplete="new-password"
                               required>

                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('confirmPassword')}"
                             th:errors="*{confirmPassword}">
                        </div>
                    </div>

                    <button type="submit"
                            class="btn btn-primary auth-submit">
                        Passwort ändern
                    </button>
                </form>

                <div class="auth-switch">
                    <span>Zurück zum Login?</span>
                    <a th:href="@{/login}">Zum Login</a>
                </div>
            </section>

        </div>
    </div>
</main>

</body>
</html>
