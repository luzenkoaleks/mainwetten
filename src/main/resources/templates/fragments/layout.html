<!doctype html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | Mainwetten'">Mainwetten</title>
    <link rel="icon"
          type="image/png"
          sizes="512x512"
          th:href="@{/images/mainwetten-favicon.png}">

    <link rel="apple-touch-icon"
          th:href="@{/images/mainwetten-favicon.png}">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link th:href="@{/css/app.css}" rel="stylesheet">
    <script th:src="@{/js/navbar.js}" defer></script>
</head>

<body>
<header th:fragment="navbar(activePage, authenticated)" class="app-header">
    <div class="container app-header-inner">
        <a class="app-brand"
           th:href="@{/}"
           aria-label="Mainwetten Startseite">

            <img class="app-brand-logo"
                 th:src="@{/images/mainwetten-navbar-logo.png}"
                 alt="Mainwetten">
        </a>

        <button class="app-nav-toggle"
                type="button"
                aria-controls="appMobileNav"
                aria-expanded="false"
                aria-label="Navigation öffnen">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div id="appMobileNav"
             class="app-nav-actions app-nav-actions-auth app-nav-collapsible"
             sec:authorize="isAuthenticated()">

            <a class="btn btn-sm app-nav-link"
               th:href="@{/dashboard}"
               th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
                Dashboard
            </a>

            <a class="btn btn-sm app-nav-cta"
               th:href="@{/catches/new}"
               th:classappend="${activePage == 'catchEntry' or activePage == 'catches'} ? ' active' : ''">
                Fang eintragen
            </a>

            <form th:action="@{/logout}"
                  method="post"
                  class="app-logout-form">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <button class="btn btn-sm app-nav-logout" type="submit">
                    Logout
                </button>
            </form>
        </div>

        <div id="appMobileNav"
             class="app-nav-actions app-nav-actions-public app-nav-collapsible"
             sec:authorize="isAnonymous()">

            <a class="btn btn-sm app-nav-link"
               th:href="@{/login}"
               th:classappend="${activePage == 'login'} ? ' active' : ''">
                Login
            </a>

            <a class="btn btn-sm app-nav-cta"
               th:href="@{/register}"
               th:classappend="${activePage == 'register'} ? ' active' : ''">
                Registrieren
            </a>
        </div>
    </div>
</header>
</body>
</html>
