<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' | Mainwetten'">Mainwetten</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>

<body>
<header th:fragment="navbar(activePage, authenticated)" class="app-header">
    <div class="container app-header-inner">
        <a class="app-brand" href="/">
            <span class="app-brand-mark">M</span>
            <span>Mainwetten</span>
        </a>

        <div class="app-nav-actions" th:if="${authenticated}">
            <a class="btn btn-sm btn-outline-secondary"
               href="/dashboard"
               th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
                Dashboard
            </a>

            <form th:action="@{/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-outline-danger" type="submit">Logout</button>
            </form>
        </div>

        <div class="app-nav-actions" th:unless="${authenticated}">
            <a class="btn btn-sm btn-outline-primary"
               href="/login"
               th:classappend="${activePage == 'login'} ? ' active' : ''">
                Login
            </a>

            <a class="btn btn-sm btn-primary"
               href="/register"
               th:classappend="${activePage == 'register'} ? ' active' : ''">
                Registrieren
            </a>
        </div>
    </div>
</header>
</body>
</html>
