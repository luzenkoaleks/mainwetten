<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Mainwetten</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Mainwetten</a>

        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-outline-danger" type="submit">Logout</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Dashboard</h1>
            <p class="text-muted mb-0">
                Eingeloggt als <strong th:text="${username}">Benutzer</strong>.
            </p>
        </div>

        <a class="btn btn-primary" href="/bets/new">Neue Wette</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3">Meine Wetten</h2>

            <div th:if="${#lists.isEmpty(participations)}" class="text-muted">
                Du bist noch in keiner Wette. Erstelle deine erste Angelwette.
            </div>

            <div class="table-responsive" th:unless="${#lists.isEmpty(participations)}">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Titel</th>
                        <th>Zeitraum</th>
                        <th>Bewertung</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="participation : ${participations}">
                        <td>
                            <a class="fw-bold text-decoration-none"
                               th:href="@{/bets/{id}(id=${participation.bet.id})}"
                               th:text="${participation.bet.title}">
                                Titel
                            </a>
                            <div class="small text-muted" th:text="${participation.bet.description}">
                                Beschreibung
                            </div>
                        </td>
                        <td>
                            <span th:text="${#temporals.format(participation.bet.startDate, 'dd.MM.yyyy')}">01.01.2026</span>
                            –
                            <span th:text="${#temporals.format(participation.bet.endDate, 'dd.MM.yyyy')}">07.01.2026</span>
                        </td>
                        <td th:text="${participation.bet.scoringMode.displayName}">
                            Bewertungsmodus
                        </td>
                        <td>
                            <span class="badge text-bg-success" th:text="${participation.status}">
                                ACCEPTED
                            </span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
