<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Mainwetten</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Mainwetten</a>

        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-outline-danger" type="submit">Logout</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <h1 class="h3">Dashboard</h1>

    <p class="lead">
        Eingeloggt als <strong th:text="${username}">Benutzer</strong>.
    </p>

    <div class="card shadow-sm mt-4">
        <div class="card-body">
            <h2 class="h5">Nächster Projektstand</h2>
            <p class="mb-0">
                Als nächstes bauen wir hier die Übersicht deiner Angelwetten ein.
            </p>
        </div>
    </div>
</main>
</body>
</html>
