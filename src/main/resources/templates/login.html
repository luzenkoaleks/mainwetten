<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Einloggen')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar('login', false)}"></header>

<main class="container app-page">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="app-card auth-card">
                <p class="home-kicker">Willkommen zurück</p>

                <h1 class="h3 mb-3">Einloggen</h1>

                <p class="text-muted mb-4">
                    Melde dich an, um deine Wetten, Einladungen und Fänge zu verwalten.
                </p>

                <div class="alert alert-danger" th:if="${param.error}">
                    Benutzername oder Passwort ist falsch.
                </div>

                <div class="alert alert-success" th:if="${param.logout}">
                    Du wurdest erfolgreich ausgeloggt.
                </div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label for="username" class="form-label">Benutzername</label>
                        <input id="username"
                               name="username"
                               class="form-control"
                               type="text"
                               autocomplete="username"
                               required
                               autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Passwort</label>
                        <input id="password"
                               name="password"
                               class="form-control"
                               type="password"
                               autocomplete="current-password"
                               required>
                    </div>

                    <button class="btn btn-primary w-100" type="submit">
                        Einloggen
                    </button>
                </form>

                <hr class="my-4">

                <p class="mb-0 text-muted">
                    Noch kein Konto?
                    <a th:href="@{/register}">Jetzt registrieren</a>
                </p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
