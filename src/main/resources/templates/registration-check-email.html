<!doctype html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('E-Mail bestätigen')}"></head>

<body>

<header th:replace="~{fragments/layout :: navbar('register', false)}"></header>

<main class="container app-page auth-page">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">

            <section class="auth-panel">
                <div class="auth-panel-header">
                    <p class="section-kicker mb-2">
                        Fast geschafft
                    </p>

                    <h1 class="auth-title mb-2">
                        Prüfe dein E-Mail-Postfach
                    </h1>

                    <p class="auth-lead mb-0">
                        Wir haben dir einen Bestätigungslink geschickt.
                        Öffne den Link in der E-Mail, um dein
                        Mainwetten-Konto zu aktivieren.
                    </p>
                </div>

                <div class="alert alert-info auth-alert">
                    Der Bestätigungslink ist 24 Stunden gültig.
                </div>

                <div class="auth-switch">
                    <span>E-Mail bereits bestätigt?</span>
                    <a th:href="@{/login}">Zum Login</a>
                </div>
            </section>

        </div>
    </div>
</main>

</body>
</html>
