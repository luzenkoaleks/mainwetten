services:
  postgres:
    image: postgres:16
    container_name: mainwetten-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-mainwetten}
      POSTGRES_USER: ${DB_USER:-mainwetten}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mainwetten}
    ports:
      - "5432:5432"
    volumes:
      - mainwetten-postgres-data:/var/lib/postgresql/data

volumes:
  mainwetten-postgres-data:

