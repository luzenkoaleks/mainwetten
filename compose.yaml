services:
  postgres:
    image: postgres:16
    container_name: mainwetten-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-mainwetten}
      POSTGRES_USER: ${DB_USER:-mainwetten}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mainwetten}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - mainwetten-postgres-data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: mainwetten-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

volumes:
  mainwetten-postgres-data: